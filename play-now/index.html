<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Opening Jaya9...</title>
<meta content="noindex, nofollow" name="robots"/>
<link href="../images/favicon.ico" rel="icon" type="image/x-icon"/>
<link href="../css/style.css" rel="stylesheet"/>


<script>const REDIRECT_URL = "https://jaya9bd.com/";
function buildFinalUrl() {
  try {
    const incoming = new URL(window.location.href);
    const out = new URL(REDIRECT_URL);
    ["ref","sub","subid","click_id","clickid","utm_source","utm_medium","utm_campaign"].forEach(function(p){
      if (incoming.searchParams.has(p)) out.searchParams.set(p, incoming.searchParams.get(p));
    });
    return out.toString();
  } catch(e) {
    return REDIRECT_URL;
  }
}
window.location.replace(buildFinalUrl());</script></head>
<body><main id="main">
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;text-align:center;padding:20px;">
<img alt="Jaya9" decoding="async" fetchpriority="low" height="75" loading="lazy" src="../images/logo.webp" style="height:60px;" width="250"/>
<p style="color:#fff;font-size:18px;">Opening Jaya9...</p>
<p style="color:#c9c4f0;font-size:14px;">If the redirect does not start automatically, <a href="https://jaya9bd.com/" id="manual-link">continue to Jaya9</a>.</p>
</div>

</main><script>document.getElementById("manual-link").href = buildFinalUrl();</script></body>
</html>
